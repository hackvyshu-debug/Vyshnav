<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vyshnav | Portfolio</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<header>
  <h1>Vyshnav</h1>
  <div class="menu-toggle" onclick="toggleMenu()">
    <i class="fas fa-bars"></i>
  </div>

  <nav id="nav">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="home" class="hero">
  <canvas id="matrix"></canvas>

  <h2>> <span id="typing"></span></h2>
  <p class="tag">Frontend Developer | SOC Analyst</p>

  <div class="buttons">
    <a href="#projects" class="btn primary">View Work</a>
    <a href="#contact" class="btn outline">Hire Me</a>
  </div>
</section>

<section id="about" class="section">
  <h2>About Me</h2>
  <p>Security-focused developer building modern web applications.</p>

  <div class="skills">
    <div class="skill">
      <p>HTML</p>
      <div class="bar"><div style="width:90%"></div></div>
    </div>

    <div class="skill">
      <p>CSS</p>
      <div class="bar"><div style="width:85%"></div></div>
    </div>

    <div class="skill">
      <p>JavaScript</p>
      <div class="bar"><div style="width:80%"></div></div>
    </div>
  </div>
</section>

<section id="projects" class="section">
  <h2>Projects</h2>
  <div class="project-card">Portfolio Website</div>
  <div class="project-card">SOC Dashboard</div>
  <div class="project-card">Cyber UI Tools</div>
</section>

<section id="contact" class="section">
  <h2>Contact</h2>

  <form action="https://formspree.io/f/yourid" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Message" required></textarea>
    <button type="submit">Send</button>
  </form>

</section>

<footer>
  <p>© 2026 Vyshnav</p>
</footer>

<script src="script.js"></script>
</body>
</html>
